name: Demo
on:
 pull_request:
    types: 
      - opened
    branches:
      - main
      - 'dev-*'
      - 'feature/**'
  workflow_dispatch:
  push:
    branches:
      - main
      - 'dev-*'
      - 'feature/**'
    paths-ignore:
      - '.github/workflows/*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm ci

      - name: lint code
        run: npm run lint
        
      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build
        
      - name: Deploy to production
        run: echo "Deploying to production..."